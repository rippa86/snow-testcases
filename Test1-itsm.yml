- name: Approve Change and Let Workflow Move it to Scheduled
  hosts: localhost
  gather_facts: false

  tasks:
    # 1. Fetch the Sys ID of the Change Request using its number
    - name: Get Change Request Details
      servicenow.itsm.change_request_info:
        instance: "{{ snow_instance }}"
        number: "{{ change_number }}"
      register: change_info

    # 2. Query the Approval table (sysapproval_approver) for this specific change
    - name: Find pending approval for this change
      servicenow.itsm.api_info:
        instance: "{{ snow_instance }}"
        resource: "sysapproval_approver"
        sysparm_query: "sysapproval={{ change_info.servicenow_instances[0].sys_id }}^state=requested"
      register: approval_info

    # 3. Update the approval record to 'approved'
    - name: Approve the change request
      servicenow.itsm.api:
        instance: "{{ snow_instance }}"
        resource: "sysapproval_approver"
        sys_id: "{{ item.sys_id }}"
        action: patch
        data:
          state: "approved"
      loop: "{{ approval_info.record }}"
      when: approval_info.record | length > 0