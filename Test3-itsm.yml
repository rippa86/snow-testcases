---
- name: ServiceNow Change Validation Playbook
  hosts: localhost
  gather_facts: false
  vars:
    # Target Change Record

  tasks:
    - name: Update Work Notes and Additional Comments
      servicenow.itsm.incident_info:
        instance:
          host: "{{ snow_instance }}"
          username: "{{ snow_username }}"
          password: "{{ snow_password }}"
        number: "{{ incident_number }}"
        state: resolved
